name: Frontend

on:
  pull_request:
    paths:
      - 'frontend/**'
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::453624448159:role/cloud-resume-challenge-github-actions

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML lint
        run: npx --yes htmlhint frontend/

      - name: JS syntax check
        run: find frontend -name "*.js" -exec node --check {} \;

  deploy-dev:
    name: Deploy dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read config from SSM
        id: config
        run: |
          for i in {1..20}; do
            BUCKET=$(aws ssm get-parameter \
              --name /cloud-resume-challenge/dev/static-site/bucket-name \
              --query Parameter.Value --output text 2>/dev/null) && \
            DIST_ID=$(aws ssm get-parameter \
              --name /cloud-resume-challenge/dev/static-site/distribution-id \
              --query Parameter.Value --output text 2>/dev/null) && break
            echo "SSM params not ready yet, waiting 30s (attempt $i/20)..."
            sleep 30
          done
          if [[ -z "$BUCKET" || -z "$DIST_ID" ]]; then
            echo "SSM params not found after 10 minutes. Has the terraform apply completed?"
            exit 1
          fi
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.config.outputs.bucket }} \
            --delete \
            --cache-control "max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.config.outputs.distribution_id }} \
            --paths "/*"

  deploy-prod:
    name: Deploy prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read config from SSM
        id: config
        run: |
          BUCKET=$(aws ssm get-parameter \
            --name /cloud-resume-challenge/prod/static-site/bucket-name \
            --query Parameter.Value --output text)
          DIST_ID=$(aws ssm get-parameter \
            --name /cloud-resume-challenge/prod/static-site/distribution-id \
            --query Parameter.Value --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.config.outputs.bucket }} \
            --delete \
            --cache-control "max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.config.outputs.distribution_id }} \
            --paths "/*"
