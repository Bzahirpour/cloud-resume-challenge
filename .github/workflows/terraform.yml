name: Terraform

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'

permissions:
  id-token: write        # required for OIDC
  contents: read
  pull-requests: write   # required to comment plans on PRs

env:
  TF_VERSION: 1.14.8
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::453624448159:role/cloud-resume-challenge-github-actions

jobs:
  lint:
    name: Lint and security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        working-directory: infra
        run: terraform fmt -check -recursive

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: tflint
        working-directory: infra
        env:
          TFLINT_CONFIG_FILE: ${{ github.workspace }}/.tflint.hcl
        run: |
          tflint --init
          tflint --recursive

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: false

  plan:
    name: Plan (${{ matrix.environment }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: infra/envs/${{ matrix.environment }}
        run: terraform init

      - name: Validate
        working-directory: infra/envs/${{ matrix.environment }}
        run: terraform validate

      - name: Plan
        id: plan
        working-directory: infra/envs/${{ matrix.environment }}
        run: |
          terraform plan -no-color -out=tfplan -lock-timeout=120s
          {
            echo 'PLAN<<EOF'
            terraform show -no-color tfplan
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.PLAN }}
          ENVIRONMENT: ${{ matrix.environment }}
        with:
          script: |
            const env = process.env.ENVIRONMENT;
            const plan = process.env.PLAN || '(no plan output)';
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... (truncated; see workflow logs for full plan)'
              : plan;
            const body = `### Terraform plan: \`${env}\`\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  apply-dev:
    name: Apply dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: lint
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Apply dev
        working-directory: infra/envs/dev
        run: |
          terraform init
          terraform apply -auto-approve

  apply-prod:
    name: Apply prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: apply-dev
    environment: prod   # GitHub holds this job until reviewer approval
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Apply prod
        working-directory: infra/envs/prod
        run: |
          terraform init
          terraform apply -auto-approve
